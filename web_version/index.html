<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Guess-O-Mania</title>

    <!-- Google Font -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">

    <!-- Font Awesome -->
    <link rel="stylesheet"
          href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">

    <!-- CSS -->
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <div class="container">

        <div class="game-box">

            <!-- Heading -->
            <h1>🎯 Guess-O-Mania</h1>

            <p class="description">
                Guess the secret number between 1 and 100.
            </p>

            <!-- Game Information -->
            <div class="game-info">

                <div class="info-box">
                    <h3>Attempts</h3>
                    <p id="attempts">0</p>
                </div>

                <div class="info-box">
                    <h3>Best Score</h3>
                    <p id="best-score">--</p>
                </div>

            </div>

            <!-- Difficulty -->
            <div class="difficulty">

                <label for="difficulty">
                    Difficulty
                </label>

                <select id="difficulty">

                    <option value="50">
                        Easy
                    </option>

                    <option value="100" selected>
                        Medium
                    </option>

                    <option value="500">
                        Hard
                    </option>

                </select>

            </div>

            <!-- Guess Input -->

            <input
                type="number"
                id="guess-input"
                placeholder="Enter your guess">

            <!-- Guess Button -->

            <button id="guess-btn">

                <i class="fa-solid fa-dice"></i>

                Guess

            </button>

            <!-- Result -->

            <p id="message">
                Start guessing...
            </p>

            <!-- Restart -->

            <button id="restart-btn">

                <i class="fa-solid fa-rotate-right"></i>

                Play Again

            </button>

        </div>

    </div>

    <script src="script.js"></script>

</body>
</html>
